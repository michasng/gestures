name: gestures
description: A video dictionary for sign language.
publish_to: none
version: 1.1.1

environment:
  sdk: ^3.11.5
  flutter: ^3.41.9

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  chewie: ^1.14.0
  collection: ^1.19.1
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.3.0
  get_it: ^9.2.1
  google_fonts: ^8.1.0
  go_router: ^17.2.2
  http: ^1.6.0
  micha_core: ^2.0.3
  package_info_plus: ^10.1.0
  universal_html: ^2.3.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  go_router_builder: ^4.3.0
  build_runner: ^2.15.0
  build_verify: ^3.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/fira_sans/
  # prevent fallback font from being downloaded from google fonts
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
